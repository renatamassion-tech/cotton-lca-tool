<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotton LCA QC Tool | Worldly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .page { min-height: 100vh; }
    .hidden { display: none !important; }
    .font-mono { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }
    .tab-btn { outline: none; }
    /* Scrollable table containers */
    .overflow-x-auto { overflow-x: auto; }
    /* Prevent layout shift when tables load */
    table { border-collapse: collapse; width: 100%; }
    th, td { vertical-align: top; }
    /* Sticky table header */
    thead { position: sticky; top: 0; z-index: 1; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Page: Home -->
  <div id="page-home" class="page"></div>

  <!-- Page: Model Check (Option 1) -->
  <div id="page-model-check" class="page hidden"></div>

  <!-- Page: GaBi Check -->
  <div id="page-gabi" class="page hidden"></div>

  <!-- Scripts (order matters) -->
  <script src="js/reference-data.js"></script>
  <script src="js/parsers.js"></script>
  <script src="js/comparison.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
